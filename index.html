<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
        <title>لوحة تحكم كابتن تاكسي</title>
            <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
                <style>
                        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                                th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
                                        th { background-color: #f2f2f2; }
                                            </style>
                                            </head>
                                            <body>
                                                <h1>إضافة رحلة جديدة</h1>
                                                    <form id="tripForm">
                                                            <input type="text" id="driverName" placeholder="اسم الكابتن" required><br><br>
                                                                    <select id="startPoint">
                                                                                <option value="حي النور">حي النور</option>
                                                                                            <option value="وسط المدينة">وسط المدينة</option>
                                                                                                        <option value="المطار">المطار</option>
                                                                                                                </select><br><br>
                                                                                                                        <select id="destination">
                                                                                                                                    <option value="المطار">المطار</option>
                                                                                                                                                <option value="الجامعة">الجامعة</option>
                                                                                                                                                            <option value="السوق التجاري">السوق التجاري</option>
                                                                                                                                                                    </select><br><br>
                                                                                                                                                                            <input type="number" id="cost" placeholder="التكلفة" required><br><br>
                                                                                                                                                                                    <button type="submit">إرسال البيانات</button>
                                                                                                                                                                                        </form>

                                                                                                                                                                                            <h2>سجل الرحلات</h2>
                                                                                                                                                                                                <table id="tripTable">
                                                                                                                                                                                                        <thead>
                                                                                                                                                                                                                    <tr>
                                                                                                                                                                                                                                    <th>الكابتن</th>
                                                                                                                                                                                                                                                    <th>الانطلاق</th>
                                                                                                                                                                                                                                                                    <th>الوجهة</th>
                                                                                                                                                                                                                                                                                    <th>التكلفة</th>
                                                                                                                                                                                                                                                                                                </tr>
                                                                                                                                                                                                                                                                                                        </thead>
                                                                                                                                                                                                                                                                                                                <tbody></tbody>
                                                                                                                                                                                                                                                                                                                    </table>

                                                                                                                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                                                                                                                                const supabaseUrl = 'https://htzwofpltvamqbmrkjrt.supabase.co';
                                                                                                                                                                                                                                                                                                                                        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0endvZnBsdHZhbXFibXJranJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE2ODg0MzUxODcsImV4cCI6MjAwMDAwMTg4N30.dLmIwezvSGTTu_CCh4b2RQ_Bc6kv7dM';
                                                                                                                                                                                                                                                                                                                                                const supabase = supabase.createClient(supabaseUrl, supabaseKey);

                                                                                                                                                                                                                                                                                                                                                        // وظيفة جلب وعرض الرحلات
                                                                                                                                                                                                                                                                                                                                                                async function fetchTrips() {
                                                                                                                                                                                                                                                                                                                                                                            const { data, error } = await supabase.from('trips').select('*');
                                                                                                                                                                                                                                                                                                                                                                                        if (data) {
                                                                                                                                                                                                                                                                                                                                                                                                        const tbody = document.querySelector('#tripTable tbody');
                                                                                                                                                                                                                                                                                                                                                                                                                        tbody.innerHTML = '';
                                                                                                                                                                                                                                                                                                                                                                                                                                        data.forEach(trip => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                            tbody.innerHTML += `<tr>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <td>${trip.driver_name}</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <td>${trip.start_point}</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <td>${trip.destination}</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <td>${trip.cost}</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </tr>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // إضافة رحلة جديدة
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('tripForm').addEventListener('submit', async (e) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                e.preventDefault();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const { error } = await supabase.from('trips').insert([{ 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            driver_name: document.getElementById('driverName').value, 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            start_point: document.getElementById('startPoint').value, 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            destination: document.getElementById('destination').value, 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            cost: document.getElementById('cost').value 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }]);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (error) alert('خطأ: ' + error.message);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                alert('تمت إضافة الرحلة!');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                fetchTrips(); // تحديث الجدول بعد الإضافة
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            fetchTrips(); // جلب البيانات عند فتح الصفحة
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
